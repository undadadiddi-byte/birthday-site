<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Открыть</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: Arial;
        overflow: hidden;
    }

    .btn {
        padding: 20px 40px;
        font-size: 24px;
        border: none;
        border-radius: 15px;
        background: #ff4d6d;
        color: white;
        cursor: pointer;
        box-shadow: 0 8px #c9184a;
        transition: all 0.1s ease;
    }

    .btn:active {
        transform: translateY(5px);
        box-shadow: 0 3px #c9184a;
    }

    .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background: red;
        animation: fall 5s linear infinite;
    }

    @keyframes fall {
        0% {transform: translateY(-100vh);}
        100% {transform: translateY(100vh);}
    }
</style>
</head>
<body>

<button class="btn" onclick="go()">//нажми сюда\\</button>

<script>
function go() {
    window.location.href = "birthday.html";
}

// немного конфетти
for (let i = 0; i < 50; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (Math.random()*3+2) + "s";
    document.body.appendChild(c);
}
</script>

</body>
</html>
